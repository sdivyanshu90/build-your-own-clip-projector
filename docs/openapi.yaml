openapi: 3.1.0
info: {title: CLIP Projector API, version: 1.0.0}
paths:
  /healthz:
    get: {responses: {'200': {description: Ready}}}
  /v1/embeddings/text:
    post:
      security: [{ApiKeyAuth: []}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TextEmbeddingRequest'}}}}
      responses: {'200': {description: Embeddings, content: {application/json: {schema: {$ref: '#/components/schemas/EmbeddingsResponse'}}}}, '401': {$ref: '#/components/responses/Unauthorized'}, '429': {$ref: '#/components/responses/RateLimited'}}
  /v1/embeddings/image:
    post:
      security: [{ApiKeyAuth: []}]
      requestBody: {required: true, content: {multipart/form-data: {schema: {type: object, required: [image], properties: {image: {type: string, format: binary}}}}}}
      responses: {'200': {description: Embedding, content: {application/json: {schema: {$ref: '#/components/schemas/EmbeddingsResponse'}}}}}
  /v1/similarity:
    post:
      security: [{ApiKeyAuth: []}]
      parameters: [{in: query, name: text, required: true, schema: {type: string, minLength: 1, maxLength: 10000}}]
      requestBody: {required: true, content: {multipart/form-data: {schema: {type: object, required: [image], properties: {image: {type: string, format: binary}}}}}}
      responses: {'200': {description: Score, content: {application/json: {schema: {$ref: '#/components/schemas/SimilarityResponse'}}}}}
components:
  securitySchemes: {ApiKeyAuth: {type: apiKey, in: header, name: X-API-Key}}
  responses:
    Unauthorized: {description: Missing or invalid key}
    RateLimited: {description: Per-client quota exceeded}
  schemas:
    TextEmbeddingRequest: {type: object, required: [texts], properties: {texts: {type: array, minItems: 1, maxItems: 32, items: {type: string, minLength: 1, maxLength: 10000}}}}
    EmbeddingsResponse: {type: object, required: [model, dimension, embeddings], properties: {model: {type: string}, dimension: {type: integer}, embeddings: {type: array, items: {type: array, items: {type: number}}}}}
    SimilarityResponse: {type: object, required: [model, similarity], properties: {model: {type: string}, similarity: {type: number, minimum: -1, maximum: 1}}}
