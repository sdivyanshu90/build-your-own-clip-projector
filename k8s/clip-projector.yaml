apiVersion: apps/v1
kind: Deployment
metadata:
  name: clip-projector
  labels: {app: clip-projector}
spec:
  replicas: 3
  selector: {matchLabels: {app: clip-projector}}
  template:
    metadata: {labels: {app: clip-projector}}
    spec:
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: api
          image: ghcr.io/example/clip-projector:1.0.0
          ports: [{containerPort: 8080}]
          envFrom: [{secretRef: {name: clip-projector-secrets}}]
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources: {requests: {cpu: "1", memory: 2Gi}, limits: {cpu: "2", memory: 4Gi}}
          readinessProbe: {httpGet: {path: /healthz, port: 8080}, initialDelaySeconds: 10}
          livenessProbe: {httpGet: {path: /healthz, port: 8080}, initialDelaySeconds: 20}
---
apiVersion: v1
kind: Service
metadata: {name: clip-projector}
spec:
  selector: {app: clip-projector}
  ports: [{port: 80, targetPort: 8080}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: clip-projector}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: clip-projector}
  minReplicas: 3
  maxReplicas: 20
  metrics: [{type: Resource, resource: {name: cpu, target: {type: Utilization, averageUtilization: 65}}}]
